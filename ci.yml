name: Rust CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  # ⚡ FAST STAGE (offline)
  fast:
    name: Fast checks (offline)
    runs-on: ubuntu-latest

    env:
      SQLX_OFFLINE: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Check
        run: cargo check --all-features

      - name: Clippy
        run: cargo clippy --all-features -- -D warnings

      - name: Test (unit only)
        run: cargo test --all-features --lib

  # 🧪 FULL STAGE (with DB)
  full:
    name: Full checks (with Postgres)
    runs-on: ubuntu-latest
    needs: fast

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: app_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/app_db

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install sqlx-cli
        run: cargo install sqlx-cli --no-default-features --features postgres

      - name: Wait for DB
        run: |
          for i in {1..15}; do
            pg_isready -h localhost -p 5432 && break
            sleep 2
          done

      - name: Run migrations
        run: |
          sqlx database create
          sqlx migrate run

      # если у тебя init-scripts вместо migrate:
      # - name: Run init scripts
      #   run: |
      #     for file in ./db/init-scripts/*.sql; do
      #       psql $DATABASE_URL -f $file
      #     done

      - name: Verify sqlx metadata
        run: cargo sqlx prepare --check

      - name: Test (integration)
        run: cargo test --all-features
